name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]


env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:

  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # 增加可用磁盘空间
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:

        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        # 如果空间还是不够用，可以把以下开启，清理出更多空间
        # remove-android: 'true'
        # remove-codeql: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image Aliyun
      run: |
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

        # 默认推送的架构列表
        platforms=("linux/amd64" "linux/arm64")

        # 解析镜像名各部分，结果存入全局变量 _image _image_name_tag _name_space _image_name
        parse_image_info() {
            local raw="${1%%@*}"
            _image="$raw"
            _image_name_tag=$(echo "$raw" | awk -F'/' '{print $NF}')
            _name_space=$(echo "$raw" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            _image_name=$(echo "$_image_name_tag" | awk -F':' '{print $1}')
        }

        # 第一遍：检测重名镜像
        declare -A duplicate_images
        declare -A temp_map
        while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^\s*# ]] && continue

            parse_image_info "$(echo "$line" | awk '{print $NF}')"
            # 用 name_space_ 作为 map key 以区分空命名空间
            name_space_key="${_name_space}_"

            if [[ -n "${temp_map[$_image_name]}" ]]; then
                if [[ "${temp_map[$_image_name]}" != "$name_space_key" ]]; then
                    echo "duplicate image name: $_image_name"
                    duplicate_images[$_image_name]="true"
                fi
            else
                temp_map[$_image_name]="$name_space_key"
            fi
        done < images.txt

        # 第二遍：拉取、打 tag、推送
        declare -A image_platform_tags
        while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^\s*# ]] && continue

            parse_image_info "$(echo "$line" | awk '{print $NF}')"

            # 如果镜像名重名且命名空间非空，加命名空间前缀
            name_space_prefix=""
            if [[ -n "${duplicate_images[$_image_name]}" && -n "$_name_space" ]]; then
                name_space_prefix="${_name_space}_"
            fi

            base_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${name_space_prefix}${_image_name_tag}"

            # 对每个架构分别拉取、打 tag、推送
            for platform in "${platforms[@]}"; do
                new_image="${base_image}-${platform//\//-}"
                echo ">>> pull --platform $platform $_image"
                # 通过 digest 区分不同架构，避免同名 tag 互相覆盖
                digest=$(docker pull --platform "$platform" "$_image" | grep "Digest:" | awk '{print $2}')
                if [[ -z "$digest" ]]; then
                    echo "ERROR: 获取 $_image ($platform) digest 失败，跳过"
                    continue
                fi
                docker tag "${_image}@${digest}" "$new_image"
                echo ">>> push $new_image"
                docker push "$new_image"
                image_platform_tags[$base_image]="${image_platform_tags[$base_image]} $new_image"
                echo "=============================================================================="
                df -hT
                echo "=============================================================================="
                docker rmi "${_image}@${digest}" "$new_image" 2>/dev/null || true
                echo "=============================================================================="
                df -hT
                echo "=============================================================================="
            done

        done < images.txt

        # 合并各架构为 manifest list，统一到同一个 tag
        for base_image in "${!image_platform_tags[@]}"; do
            echo ">>> 创建多架构 manifest: $base_image"
            docker buildx imagetools create -t "$base_image" ${image_platform_tags[$base_image]}
            echo "manifest 推送完成: $base_image"
        done
